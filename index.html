<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yes or No</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.container{
    text-align:center;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#f44336;
    color:white;
    position:absolute;
    transition:0.1s;
}
</style>
</head>

<body>

<div id="cursor">🖱️</div>

<style>
#cursor{
    width:50px;
    height:50px;
    border-radius:50%;
    background:red;
    position:fixed;
    left:50%;
    top:80%;
    transform:translate(-50%, -50%);
    z-index:99999;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
    user-select:none;
}
</style>

<script>
const cursor = document.getElementById("cursor");

cursor.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];

    cursor.style.left = touch.clientX + "px";
    cursor.style.top = touch.clientY + "px";
});
</script>    
    
<div class="container">
    <h1>Mau jadi pacar aku? ❤️</h1>

    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton() {
    noBtn.style.left =
        Math.random() * (window.innerWidth - 100) + "px";

    noBtn.style.top =
        Math.random() * (window.innerHeight - 50) + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

document.getElementById("yesBtn").onclick = () => {
    alert("Yeayyy ❤️");
};
</script>

</body>
</html>
